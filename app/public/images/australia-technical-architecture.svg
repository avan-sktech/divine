<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4C158"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8941F"/>
    </linearGradient>
    <!-- Connection Gradient -->
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0"/>
    </linearGradient>
    <!-- Node Glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#0A0A0A"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#F8F8F8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2">INFRASTRUCTURE ARCHITECTURE</text>
  <line x1="200" y1="42" x2="400" y2="42" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  
  <!-- Main Hub (Center) -->
  <g transform="translate(300, 200)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#2A2A2A" stroke-width="2"/>
    <circle cx="0" cy="0" r="50" fill="#141414" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Inner Hub -->
    <circle cx="0" cy="0" r="25" fill="#0A0A0A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#D4AF37" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">CORE</text>
    
    <!-- Orbital Ring -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4 4"/>
  </g>
  
  <!-- Tier 1 Nodes - Major Retailers (Woolworths & Coles) -->
  <!-- Node 1: Woolworths -->
  <g transform="translate(140, 120)">
    <circle cx="0" cy="0" r="35" fill="#141414" stroke="url(#goldGrad)" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#F8F8F8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">WOOLWORTHS</text>
    <text x="0" y="10" text-anchor="middle" fill="#D4AF37" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">37%</text>
    <!-- Status indicator -->
    <circle cx="25" cy="-25" r="4" fill="#D4AF37" filter="url(#nodeGlow)"/>
    <!-- Connection line to center -->
    <line x1="28" y1="28" x2="132" y2="52" stroke="url(#connGrad)" stroke-width="2"/>
  </g>
  
  <!-- Node 2: Coles -->
  <g transform="translate(460, 120)">
    <circle cx="0" cy="0" r="35" fill="#141414" stroke="url(#goldGrad)" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#F8F8F8" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">COLES</text>
    <text x="0" y="10" text-anchor="middle" fill="#D4AF37" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">28%</text>
    <!-- Status indicator -->
    <circle cx="25" cy="-25" r="4" fill="#D4AF37" filter="url(#nodeGlow)"/>
    <!-- Connection line to center -->
    <line x1="-28" y1="28" x2="-132" y2="52" stroke="url(#connGrad)" stroke-width="2"/>
  </g>
  
  <!-- Tier 2 Nodes - Secondary Retailers -->
  <!-- IGA -->
  <g transform="translate(80, 280)">
    <circle cx="0" cy="0" r="28" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">IGA</text>
    <text x="0" y="10" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="10">~9%</text>
    <!-- Connection -->
    <line x1="20" y1="-20" x2="180" y2="-80" stroke="#2A2A2A" stroke-width="1"/>
  </g>
  
  <!-- Aldi -->
  <g transform="translate(180, 320)">
    <circle cx="0" cy="0" r="28" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">ALDI</text>
    <text x="0" y="10" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="10">~8%</text>
    <!-- Connection -->
    <line x1="0" y1="-28" x2="100" y2="-92" stroke="#2A2A2A" stroke-width="1"/>
  </g>
  
  <!-- Costco -->
  <g transform="translate(420, 320)">
    <circle cx="0" cy="0" r="28" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">COSTCO</text>
    <text x="0" y="10" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="10">~3%</text>
    <!-- Connection -->
    <line x1="0" y1="-28" x2="-100" y2="-92" stroke="#2A2A2A" stroke-width="1"/>
  </g>
  
  <!-- Others -->
  <g transform="translate(520, 280)">
    <circle cx="0" cy="0" r="28" fill="#0A0A0A" stroke="#3A3A3A" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">OTHERS</text>
    <text x="0" y="10" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="10">~15%</text>
    <!-- Connection -->
    <line x1="-20" y1="-20" x2="-180" y2="-80" stroke="#2A2A2A" stroke-width="1"/>
  </g>
  
  <!-- Data Flow Indicators -->
  <g opacity="0.6">
    <!-- Pulse dots along main connections -->
    <circle cx="200" cy="150" r="2" fill="#D4AF37">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="150" r="2" fill="#D4AF37">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bottom Legend -->
  <g transform="translate(50, 375)">
    <!-- Tier 1 Label -->
    <rect x="0" y="0" width="12" height="12" rx="2" fill="url(#goldGrad)"/>
    <text x="20" y="10" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="10">Primary Nodes (Duopoly Control)</text>
    
    <!-- Tier 2 Label -->
    <rect x="220" y="0" width="12" height="12" rx="2" fill="#3A3A3A"/>
    <text x="240" y="10" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="10">Secondary Nodes (Fragmented)</text>
    
    <!-- Core Label -->
    <circle cx="420" cy="6" r="6" fill="#141414" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="435" y="10" fill="#A1A1AA" font-family="system-ui, -apple-system, sans-serif" font-size="10">Central Distribution Core</text>
  </g>
</svg>